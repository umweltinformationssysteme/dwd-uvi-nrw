name: UV-Index NRW aktualisieren

on:
  schedule:
    - cron: "30 8 * * *"   # täglich um 08:30 UTC (= 09:30 / 10:30 MEZ/MESZ)
  workflow_dispatch:         # manueller Start über GitHub UI jederzeit möglich

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write        # Erlaubt dem Workflow, Dateien ins Repo zu committen

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Skript ausführen
        run: python scripts/fetch_uvi.py

      - name: Änderungen committen und pushen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md data/uvi_nrw.json
          git diff --cached --quiet || git commit -m "chore: UV-Index aktualisiert $(date -u +'%Y-%m-%d')"
          git push
