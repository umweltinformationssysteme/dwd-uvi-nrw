name: UV-Index NRW aktualisieren

on:
  schedule:
    - cron: "30 8 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v5        # ← v4 → v5 (Node 24)

      - name: Python einrichten
        uses: actions/setup-python@v5   # ← bleibt v5, bereits Node 24
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Skript ausführen
        run: python scripts/fetch_uvi.py

      - name: Änderungen committen und pushen
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md data/uvi_nrw.json
          git diff --cached --quiet || git commit -m "chore: UV-Index aktualisiert $(date -u +'%Y-%m-%d')"
          git push
