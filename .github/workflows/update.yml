name: Update UV Index NRW

on:
  schedule:
    - cron: "0 9 * * *"    # daily at 09:00 UTC (= 10:00 / 11:00 CET/CEST)
  workflow_dispatch:         # manual trigger via GitHub UI at any time

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write        # allows the workflow to commit files to the repo

    steps:
      - name: Check out repository
        uses: actions/checkout@v5        # ← Node 24

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        run: python scripts/fetch_uvi.py

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md data/uvi_nrw.json
          git diff --cached --quiet || git commit -m "chore: update UV index $(date -u +'%Y-%m-%d')"
          git push
